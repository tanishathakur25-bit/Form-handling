<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Details Form</title>
    <link rel="stylesheet" href="form.css">
</head>

<body>

<div class="container">
    <h2>User Details Form</h2>

    <form id="form">
        <input type="text" id="name" placeholder="Name"><br>
        <input type="number" id="age" placeholder="Age"><br>
        <input type="text" id="place" placeholder="Place"><br>
        <input type="text" id="father" placeholder="Father Name"><br>
        <input type="text" id="hobby" placeholder="Hobby"><br>

        <input type="text" id="gender" placeholder="Gender"><br>
        <input type="text" id="mobile" placeholder="Mobile Number"><br>
        <input type="email" id="email" placeholder="Email"><br>
        <input type="text" id="skills" placeholder="Skills"><br>
        <input type="text" id="subject" placeholder="Favorite Subject"><br>

        <button type="submit">Submit</button>
    </form>

    <div id="result"></div>
</div>

<script src="form.js"></script>

</body>
</html>
